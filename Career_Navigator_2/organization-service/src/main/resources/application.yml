server:
  port: 9036
spring:
  application:
    name: organization-service

  config:
    import: configserver:http://localhost:8888

  kafka:
    bootstrap-servers: localhost:9092

  cloud:
    bus:
      id: ${spring.application.name}:${server.port}
      destination: springCloudBus
    kafka:
      binder:
        brokers: http://localhost:9092


eureka:
  client:
    service-url:
      defaultZone: localhost://8761/eureka/


management:
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    env:
      show-values: always
  endpoints:
    web:
      exposure:
        include: "*"