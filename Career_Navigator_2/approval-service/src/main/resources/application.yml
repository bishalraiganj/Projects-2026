server:
  port: 9034

spring:
  application:
    name: approval-service
  datasource:
    url: jdbc:mysql://localhost:3306/career_navigator_2
    username: career_navigator_2
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
#        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
#    database-platform: org.hibernate.dialect.MySQLDialect

  config:
    import: configserver:http://localhost:8888

  kafka:
    bootstrap-servers: localhost:9092

  cloud:
    function:
      definition: employeeSkillInput

    # ? Config Bus (OK)
    bus:
      enabled: true
      id: ${spring.application.name}:${server.port}
      destination: springCloudBus

    # ? Event Streaming
    stream:

      defaultBinder: kafka

      bindings:

        # ? CONSUMER
        employeeSkillInput-in-0:
          destination: employee-skill-events
          group: approval-group

          consumer:
            maxAttempts: 3                  # retry 3 times
            backOffInitialInterval: 1000    # 1 sec
            backOffMultiplier: 2.0          # exponential backoff

        # ? PRODUCER
        approvalOutput-out-0:
          destination: approval-events
        rejectedOutput-out-0:
          # Producing channel for rejected approvals
          destination: rejected-events
      kafka:
        binder:
          brokers: localhost:9092

        bindings:

          employeeSkillInput-in-0:
            consumer:
              enableDlq: true
              dlqName: employee-skill-events.DLQ


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


management:
  endpoint:
    env:
      show-values: always

    bus-refresh:
      enabled: true
    #      access: unrestricted
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"

  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true