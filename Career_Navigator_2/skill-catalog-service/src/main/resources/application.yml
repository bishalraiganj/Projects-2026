server:
  port: 9030

spring:
  application:
    name: skill-catalog-service
  datasource:
    url: jdbc:mysql://localhost:3306/career_navigator_2
    username: career_navigator_2
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  config:
    import: configserver:http://localhost:8888

  kafka:
    bootstrap-servers: localhost:9092

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092

    bus:
      id: ${spring.application.name}:${server.port}
      enabled: true
      destination: springCloudBus

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    env:
      show-values: always

    bus-refresh:
      enabled: true
#      access: unrestricted
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"

  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true

