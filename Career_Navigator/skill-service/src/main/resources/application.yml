server:
  port: 9040

spring:
  application:
    name: skill-service

  config:
    import: optional:configserver:http://config-server:8888

  kafka:
    bootstrap-servers: kafka:9092
  cloud:
    bus:
      id: skill-service:${server.port}
      enabled: true


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone: http://eureka-server:8761/eureka/

management:
  endpoint:
    env:
      show-values: always
  endpoints:
    web:
      exposure:
        include: "*"