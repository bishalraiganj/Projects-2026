server:
  port: 9033

spring:
  application:
    name: transaction-service


  datasource:
    url: jdbc:mysql://localhost:3306/transaction_db
    username: nbi_bank
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer:
      value-serializer:
    consumer:
      key-deserializer:
      value-deserializer:
      properties:
        spring.json.trusted.packages: "com.nbi.transaction_service.models.events"
    listener:
      ack-mode: record


management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  endpoint:
    health:
      show-details: always
    env:
      show-values: always




